name: Manual release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must match pyproject.toml version, e.g. v0.6.1).'
        required: true
        type: string
      prerelease:
        description: 'Mark as a GitHub prerelease.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = uv run --python 3.11 python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $expectedTag = "v$version"
          $actualTag = "${{ inputs.tag }}"
          if ($actualTag -ne $expectedTag) {
            throw "Release tag '$actualTag' must match pyproject version '$version' ($expectedTag)."
          }

      - name: Run tests
        run: uv run --python 3.11 --group dev pytest tests/ -q

      - name: Set up .NET 8 LTS
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET sidecar (self-contained single-file)
        run: |
          dotnet publish dotnet/etw-extract.csproj `
            -c Release -r win-x64 --self-contained `
            -o dotnet/publish/win-x64

      - name: Stage sidecar binary for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item dotnet/publish/win-x64/etw-extract.exe dist/etw-extract.exe

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}"
          $ghArgs = @(
            "release", "create", $tag,
            "--target", "$env:GITHUB_SHA",
            "--title", $tag,
            "--generate-notes"
          )
          if ("${{ inputs.prerelease }}" -eq "true") {
            $ghArgs += "--prerelease"
          }
          Get-ChildItem -Path dist -File | ForEach-Object {
            $ghArgs += $_.FullName
          }
          & gh @ghArgs

      - name: Update README Quick Install URLs to point at this release
        if: ${{ inputs.prerelease != true }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The README hard-codes wheel + sidecar URLs (validation review concluded
          # placeholders like <release-tag>/<wheel-file> were a fresh-user trap).
          # After cutting a release we substitute the new tag in so the Quick
          # Install snippet always reflects the latest published artifacts.
          $tag = "${{ inputs.tag }}"
          $version = $tag -replace '^v',''

          # Re-base on latest master so the commit doesn't fork off the
          # workflow's original checkout SHA (which may have been a tag or
          # an older commit).
          git fetch origin master
          git checkout -B master origin/master

          $readme = Get-Content README.md -Raw
          $original = $readme

          # Wheel download URLs: .../releases/download/vX.Y.Z/etw_mcp-X.Y.Z-py3-none-any.whl
          $readme = $readme -replace `
            'releases/download/v\d+\.\d+\.\d+/etw_mcp-\d+\.\d+\.\d+-py3-none-any\.whl', `
            "releases/download/$tag/etw_mcp-$version-py3-none-any.whl"

          # Sidecar download URLs: .../releases/download/vX.Y.Z/etw-extract.exe
          $readme = $readme -replace `
            'releases/download/v\d+\.\d+\.\d+/etw-extract\.exe', `
            "releases/download/$tag/etw-extract.exe"

          # "hard-coded to v0.2.0" / "etw-mcp v0.2.0 importable" prose markers
          $readme = $readme -replace `
            'hard-coded to v\d+\.\d+\.\d+', `
            "hard-coded to $tag"
          $readme = $readme -replace `
            'etw-mcp v\d+\.\d+\.\d+ importable', `
            "etw-mcp $tag importable"

          if ($readme -eq $original) {
            Write-Host "README URLs already at $tag — nothing to update."
            exit 0
          }

          Set-Content README.md -Value $readme -NoNewline

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -s -m "docs: README — bump Quick Install URLs to $tag" `
                       -m "Auto-generated by .github/workflows/release.yml after publishing $tag."
          git push origin master
